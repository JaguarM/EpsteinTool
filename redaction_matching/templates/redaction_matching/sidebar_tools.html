        <!-- 1. Candidates -->
        <div class="tool-card">
          <h2><span class="step">1</span> Candidates</h2>

          <div style="display: flex; gap: 4px; margin-bottom: 4px;">
            <input type="text" id="name-input" class="tool-input" placeholder="Type name..." style="flex:1;">
            <button class="tool-btn" style="width: auto;" onclick="addName()">Add</button>
          </div>

          <div id="paste-area" style="display:none; margin-bottom:12px; background: rgba(0,0,0,0.2); border-radius: 6px; padding: 8px; border: 1px dashed rgba(255,255,255,0.1);">
            <textarea id="paste-input" class="tool-input" style="height: 120px; resize:vertical; background: transparent; border: none; font-family: monospace;"
              placeholder="Paste a list of names (one per line)..."></textarea>
            <div style="display: flex; gap: 4px; margin-top: 8px;">
              <button class="tool-btn" style="flex:1;" onclick="processPaste()">Import Names</button>
              <button class="tool-btn secondary" style="width: auto;" onclick="document.getElementById('paste-area').style.display='none'">Cancel</button>
            </div>
          </div>

          <div style="display:flex; justify-content:space-between; margin-bottom: 8px; padding: 0 2px;">
            <a href="#" style="color:#8ab4f8; font-size:11px; text-decoration:none; display: flex; align-items: center; gap: 4px;"
              onclick="document.getElementById('paste-area').style.display = document.getElementById('paste-area').style.display === 'none' ? 'block' : 'none'; return false;">
              <span class="material-symbols-outlined" style="font-size: 14px;">content_paste</span> Paste Mode</a>
            <a href="#" style="color:#f28b82; font-size:11px; text-decoration:none; display: flex; align-items: center; gap: 4px;"
              onclick="clearAll(); return false;">
              <span class="material-symbols-outlined" style="font-size: 14px;">delete_sweep</span> Clear List</a>
          </div>


          <div class="table-cont">
            <table>
              <thead>
                <tr>
                  <th onclick="setSort('name')">Name</th>
                  <th class="col-right" onclick="setSort('width')">Width (px) <span id="sort-icon"></span></th>
                  <th class="col-del"></th>
                </tr>
              </thead>
              <tbody id="names-body"></tbody>
            </table>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
            <button class="tool-btn secondary" style="padding: 2px 8px; font-size: 11px; width: auto;"
              onclick="changePage(-1)" id="btn-prev-page" disabled>&lt; Prev</button>
            <div style="text-align:center; font-size:11px; color:#9aa0a6;" id="page-info"></div>
            <button class="tool-btn secondary" style="padding: 2px 8px; font-size: 11px; width: auto;"
              onclick="changePage(1)" id="btn-next-page" disabled>Next &gt;</button>
          </div>
        </div>

        <!-- 2. All Matches Summary -->
        <div class="tool-card" id="all-matches-card" style="display: none; border: 1px solid #16a34a; background: rgba(22, 163, 74, 0.05);">
          <h2 style="color: #16a34a; margin-bottom: 4px;"><span class="step"
              style="background:#16a34a; color:#202124;">2</span> All Matches</h2>
          <div id="match-progress-container" style="height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; margin-bottom: 8px; overflow: hidden;">
            <div id="match-progress-bar" style="height: 100%; width: 0%; background: #16a34a; transition: width 0.5s ease;"></div>
          </div>

          <div id="all-matches-summary" style="font-size: 12px; color: #9aa0a6; margin-bottom: 8px;"></div>
          <div class="table-cont" style="max-height: 250px; overflow-y: auto;">
            <table>
              <thead>
                <tr>
                  <th>Page</th>
                  <th class="col-right">Width (px)</th>
                  <th>Matches</th>
                </tr>
              </thead>
              <tbody id="all-matches-body"></tbody>
            </table>
          </div>
        </div>
