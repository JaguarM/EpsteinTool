<!-- guesser_core/templates/guesser_core/text_options_bar.html -->
<div id="text-options-bar" class="options-bar">
  <div class="options-group">
    <div class="options-group-header">General</div>
    <div class="options-group-controls">
      <span class="options-label">Tolerance (px)</span>
      <input type="number" id="tolerance" value="3" step="0.1" class="toolbar-input-small">
    </div>
  </div>

  <div class="options-divider"></div>

  <div class="options-group">
    <div class="options-group-header">Rendering</div>
    <div class="options-group-controls">
      <label class="checkbox-lbl"><input type="checkbox" id="kerning" checked> Kerning</label>
      <label class="checkbox-lbl"><input type="checkbox" id="ligatures" checked> Ligatures</label>
      <label class="checkbox-lbl"><input type="checkbox" id="force-uppercase"> Uppercase</label>
    </div>
  </div>
</div>
