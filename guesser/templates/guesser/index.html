<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Epstein Unredactor - PDF Viewer</title>

  <!-- Material Symbols Outlined for Chrome-like icons -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- PDF.js version 3.11.174 to exactly match user's ExampleViewer -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>

  <link rel="stylesheet" href="/static/guesser/styles.css">
</head>

<body>
  <!-- Drag and drop overlay -->
  <div id="drag-overlay" class="hidden">
    <div class="drag-text">Drop PDF to Analyze</div>
  </div>

  <div id="app-container">
    <!-- Top Toolbar -->
    <header id="toolbar">
      <div id="toolbar-left">
        <button id="toggle-sidebar" class="icon-button" title="Toggle thumbnails">
          <span class="material-symbols-outlined">view_sidebar</span>
        </button>
        <div id="document-title">No PDF Loaded</div>
      </div>

      <div id="toolbar-center">
        <input type="number" id="page-input" class="toolbar-input" value="0" min="0" max="0">
        <span id="page-count">/ 0</span>
      </div>

      <div id="toolbar-right">
        <div class="zoom-controls">
          <button id="zoom-out" class="icon-button" title="Zoom out">
            <span class="material-symbols-outlined">remove</span>
          </button>
          <div class="zoom-input-container">
            <input type="text" id="zoom-input" value="100%">
          </div>
          <button id="zoom-in" class="icon-button" title="Zoom in">
            <span class="material-symbols-outlined">add</span>
          </button>
        </div>

        <div class="divider"></div>

        <button id="toggle-tools" class="icon-button active" title="Toggle AI Unredactor Tools">
          <span class="material-symbols-outlined">build</span>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <div id="main-content">

      <!-- Thumbnails Sidebar (Left) -->
      <aside id="sidebar" class="hidden">
        <div id="thumbnail-view"></div>
      </aside>

      <!-- PDF Viewer Container -->
      <main id="viewer-container">
        <div id="viewer" class="pdfViewer">
          <!-- Canvas items go here -->
          <div style="margin-top: 100px; color: #9aa0a6; text-align: center;">
            <span class="material-symbols-outlined" style="font-size: 48px; opacity: 0.5;">description</span>
            <p>Upload a PDF document to begin.</p>
          </div>
        </div>
      </main>

      <!-- AI Tools Sidebar (Right) -->
      <aside id="tools-sidebar">

        <!-- 1. Analyze PDF -->
        <div class="tool-card">
          <h2><span class="step">1</span> Analysis</h2>
          <div class="control-group">
            <input type="file" id="pdf-file" accept="application/pdf, .pdf" style="display: none;">
            <button id="analyze-btn" class="tool-btn" onclick="document.getElementById('pdf-file').click()">Select PDF
              for Analysis</button>
          </div>
          <div id="pdf-status" class="status-msg">Waiting for file...</div>
        </div>

        <!-- 2. Candidate Names -->
        <div class="tool-card">
          <h2><span class="step">2</span> Candidates</h2>

          <div class="tool-grid">
            <div class="control-group">
              <label>Font</label>
              <select id="font" class="tool-input"></select>
            </div>
            <div class="control-group">
              <label>Size (pt)</label>
              <input type="number" id="size" class="tool-input" value="12" step="1">
            </div>
          </div>

          <!-- Advanced Setup -->
          <details style="margin-bottom: 12px; cursor: pointer;">
            <summary style="font-size: 12px; color: #8ab4f8; margin-bottom: 8px;">Advanced Settings</summary>
            <div class="tool-grid">
              <div class="control-group">
                <label>Scale (%)</label>
                <input type="number" id="calc-scale" class="tool-input" value="133" min="1" step="1">
              </div>
              <div class="control-group">
                <label>Tolerance (pt)</label>
                <input type="number" id="tolerance" class="tool-input" value="3" step="0.1">
              </div>
              <label class="checkbox-lbl"><input type="checkbox" id="kerning" checked> Kerning</label>
              <label class="checkbox-lbl"><input type="checkbox" id="ligatures" checked> Ligatures</label>
              <label class="checkbox-lbl"><input type="checkbox" id="force-uppercase"> Uppercase</label>
            </div>
          </details>

          <div style="display: flex; gap: 4px; margin-bottom: 4px;">
            <input type="text" id="name-input" class="tool-input" placeholder="Type name..." style="flex:1;">
            <button class="tool-btn" style="width: auto;" onclick="addName()">Add</button>
          </div>

          <details id="paste-details" style="display:none; margin-bottom:8px;">
            <textarea id="paste-input" class="tool-input" style="height: 80px; resize:vertical;"
              placeholder="Paste names..."></textarea>
            <button class="tool-btn secondary" style="margin-top:4px;" onclick="processPaste()">Import List</button>
          </details>

          <div style="display:flex; justify-content:space-between; margin-bottom: 4px;">
            <a href="#" style="color:#8ab4f8; font-size:11px; text-decoration:none;"
              onclick="document.getElementById('paste-details').style.display = document.getElementById('paste-details').style.display === 'none' ? 'block' : 'none'; return false;">Paste
              Mode</a>
            <a href="#" style="color:#f28b82; font-size:11px; text-decoration:none;"
              onclick="clearAll(); return false;">Clear All</a>
          </div>

          <div class="table-cont">
            <table>
              <thead>
                <tr>
                  <th onclick="setSort('name')">Name</th>
                  <th class="col-right" onclick="setSort('width')">Width (pt) <span id="sort-icon"></span></th>
                  <th class="col-del"></th>
                </tr>
              </thead>
              <tbody id="names-body"></tbody>
            </table>
          </div>
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 4px;">
            <button class="tool-btn secondary" style="padding: 2px 8px; font-size: 11px; width: auto;"
              onclick="changePage(-1)" id="btn-prev-page" disabled>&lt; Prev</button>
            <div style="text-align:center; font-size:11px; color:#9aa0a6;" id="page-info"></div>
            <button class="tool-btn secondary" style="padding: 2px 8px; font-size: 11px; width: auto;"
              onclick="changePage(1)" id="btn-next-page" disabled>Next &gt;</button>
          </div>
        </div>

        <!-- 3. All Matches Summary -->
        <div class="tool-card" id="all-matches-card" style="display: none; border-color: #16a34a;">
          <h2 style="color: #16a34a;"><span class="step"
              style="background:#202124; color:#16a34a; border: 1px solid #16a34a;">3</span> All Matches</h2>
          <div id="all-matches-summary" style="font-size: 12px; color: #9aa0a6; margin-bottom: 8px;"></div>
          <div class="table-cont" style="max-height: 250px; overflow-y: auto;">
            <table>
              <thead>
                <tr>
                  <th>Page</th>
                  <th class="col-right">Width (pt)</th>
                  <th class="col-right">Height (pt)</th>
                  <th>Matches</th>
                </tr>
              </thead>
              <tbody id="all-matches-body"></tbody>
            </table>
          </div>
        </div>

      </aside>

    </div>
  </div>

  <script src="/static/guesser/state.js"></script>
  <script src="/static/guesser/api.js"></script>
  <script src="/static/guesser/pdf-viewer.js"></script>
  <script src="/static/guesser/ui-events.js"></script>
  <script src="/static/guesser/app.js"></script>
</body>

</html>
