    <!-- Font Secondary Toolbar -->
    <div id="text-options-bar">
      <span class="options-label">Font</span>
      <select id="font"></select>

      <div class="options-divider"></div>

      <span class="options-label">Size (pt)</span>
      <input type="number" id="size" value="12" step="1">

      <div class="options-divider"></div>

      <span class="options-label">Scale (%)</span>
      <input type="number" id="calc-scale" value="178" min="1" step="1">

      <div class="options-divider"></div>

      <span class="options-label">Tolerance (px)</span>
      <input type="number" id="tolerance" value="3" step="0.1">

      <div class="options-divider"></div>

      <label class="checkbox-lbl" style="color: #bdc1c6; margin-right: 8px;"><input type="checkbox" id="kerning" checked> Kerning</label>
      <label class="checkbox-lbl" style="color: #bdc1c6; margin-right: 8px;"><input type="checkbox" id="ligatures" checked> Ligatures</label>
      <label class="checkbox-lbl" style="color: #bdc1c6;"><input type="checkbox" id="force-uppercase"> Uppercase</label>
    </div>

    <!-- Fabric Options Bar -->
    <div id="fabric-options-bar" class="hidden">
      <!-- Group 1: Font -->
      <span class="options-label" style="margin-left: 8px;">Font:</span>
      <select id="fabric-font-family">
        <option value="Arial">Arial</option>
        <option value="Calibri">Calibri</option>
        <option value="Courier New">Courier New</option>
        <option value="Times New Roman" selected>Times New Roman</option>
      </select>
      <input type="number" id="fabric-font-size" value="12" min="4" max="400" title="Font size (px)">
      <span class="options-label">px</span>
      <span class="options-label" style="margin-left: 8px;">Scale:</span>
      <input type="number" id="fabric-font-scale" value="100" min="10" max="500" step="1" title="Horizontal scale (%)">
      <span class="options-label">%</span>

      <div class="options-divider"></div>

      <!-- Group 2: Basic formatting -->
      <button id="fabric-bold"          class="icon-button options-toggle" title="Bold"><b style="font-family:serif;">B</b></button>
      <button id="fabric-italic"        class="icon-button options-toggle" title="Italic"><em style="font-family:serif;">I</em></button>
      <button id="fabric-underline"     class="icon-button options-toggle" title="Underline"><u style="font-family:serif;">U</u></button>
      <button id="fabric-strikethrough" class="icon-button options-toggle" title="Strikethrough"><s style="font-family:serif;">S</s></button>

      <div class="options-divider"></div>

      <!-- Group 3: Spacing -->
      <span class="options-label">Spacing:</span>
      <input type="number" id="fabric-letter-spacing" value="0" min="-0.5" max="2" step="0.01" title="Letter spacing (em)">
      <span class="options-label">em</span>

      <div class="options-divider"></div>

      <!-- Group 4: Color -->
      <input type="color" id="fabric-color" value="#000000" title="Text color">

      <!-- Group 5: Redact gap controls -->
      <div id="redact-gap-controls" class="hidden" style="display:contents">
        <div class="options-divider"></div>
        <span class="options-label">Gap:</span>
        <input type="range" id="redact-gap-slider" min="0" max="500" step="1" value="50" title="Redaction gap width">
        <span id="redact-gap-display" class="options-label">50 px</span>
      </div>
    </div>
