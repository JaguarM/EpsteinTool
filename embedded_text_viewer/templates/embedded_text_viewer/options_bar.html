    <!-- Embedded Text Viewer Sub-toolbar -->
    <div id="etv-options-bar" class="hidden">
      <span class="options-label">Color</span>
      <input type="color" id="etv-color" value="#0064ff" title="Span color">

      <div class="options-divider"></div>

      <span class="options-label">Opacity</span>
      <input type="range" id="etv-opacity" min="0" max="100" value="85" title="Span opacity">
      <span id="etv-opacity-display" class="options-label">85%</span>

      <div class="options-divider"></div>

      <span class="options-label">Mode</span>
      <select id="etv-mode">
        <option value="text">Text Labels</option>
        <option value="boxes">Highlight Boxes</option>
      </select>
    </div>



    <!-- Fabric Options Bar -->
    <div id="fabric-options-bar" class="hidden">
      <!-- Group 1: Font -->
      <span class="options-label" style="margin-left: 8px;">Font:</span>
      <select id="fabric-font-family">
        <option value="Arial">Arial</option>
        <option value="Calibri">Calibri</option>
        <option value="Courier New">Courier New</option>
        <option value="Times New Roman" selected>Times New Roman</option>
      </select>
      <input type="number" id="fabric-font-size" value="12" min="4" max="400" title="Font size (px)">
      <span class="options-label">px</span>

      <div class="options-divider"></div>

      <!-- Group 2: Basic formatting -->
      <button id="fabric-bold"          class="icon-button options-toggle" title="Bold"><b style="font-family:serif;">B</b></button>
      <button id="fabric-italic"        class="icon-button options-toggle" title="Italic"><em style="font-family:serif;">I</em></button>
      <button id="fabric-underline"     class="icon-button options-toggle" title="Underline"><u style="font-family:serif;">U</u></button>
      <button id="fabric-strikethrough" class="icon-button options-toggle" title="Strikethrough"><s style="font-family:serif;">S</s></button>

      <div class="options-divider"></div>

      <!-- Group 3: Spacing -->
      <span class="options-label">Spacing:</span>
      <input type="number" id="fabric-letter-spacing" value="0" min="-0.5" max="2" step="0.01" title="Letter spacing (em)">
      <span class="options-label">em</span>

      <div class="options-divider"></div>

      <!-- Group 4: Color -->
      <input type="color" id="fabric-color" value="#000000" title="Text color">

    </div>
