<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WebGL Shader Test</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: #1e1e1e;
      color: #ccc;
      font-family: monospace;
      font-size: 13px;
    }

    h3 {
      margin: 0 0 4px;
      font-size: 0.75rem;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .strips {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .row h3 {
      width: 64px;
      flex-shrink: 0;
      text-align: right;
      margin: 0;
    }

    /* Display at 3× so the 256×64 strips are actually readable */
    img, canvas {
      display: block;
      width: 768px;
      height: 192px;
      image-rendering: pixelated;
      border: 1px solid #444;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .controls label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    button {
      padding: 5px 14px;
      background: #0e639c;
      color: #fff;
      border: none;
      cursor: pointer;
      font-family: monospace;
      font-size: 13px;
    }

    button:hover { background: #1177bb; }

    #error {
      color: #f48771;
      white-space: pre;
      margin-top: 6px;
      min-height: 1em;
    }

    #editor {
      width: 100%;
      height: 220px;
      background: #252526;
      color: #d4d4d4;
      border: 1px solid #555;
      padding: 10px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      tab-size: 2;
    }
  </style>
</head>
<body>

  <div class="strips">
    <div class="row"><h3>image</h3>   <img alt="image"    src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAABACAAAAADQNvZiAAAAcUlEQVR4nO3OQQGAMADEsK7KcQ4u2KMXBTkvbRIncRIncRIncRIncRIncRIncRIncd4OzMzMzMzMzMz87bxxEidxEidxEidxEidxEidxEidxEidxEnce2iRO4iRO4iRO4iRO4iRO4iRO4iRO4rwduO0Dzy0A7O0K9gYAAAAASUVORK5CYII="></div>
    <div class="row"><h3>mask</h3>    <img alt="mask"     src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAABACAAAAADQNvZiAAAAeklEQVR4nOXOMQEAAAyDMIp/0ZOxgyjIWJvESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzfgW8H1CIBf3F985cAAAAASUVORK5CYII="></div>
    <div class="row"><h3>output</h3>  <canvas id="c" width="256" height="64"></canvas></div>
    <div class="row"><h3>expected</h3><img alt="expected"  src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAABACAAAAADQNvZiAAAAh0lEQVR4nO3asQ0AMQzDQJrI4j95MoYL/k0gqJXm0iZxEidxEidxEidxEidxEidxEidxEidxw7RJnMRJnMRJnMRJnMRJnMRJnMRJnMRJ3Pz/gDiJkziJkziJkziJkziJkziJkziJk7jzLe/z2wVInMRJnMRJnMRJnMRJnMRJnMRJnMS5HWDbA5aEBH1s1EaaAAAAAElFTkSuQmCC"></div>
  </div>

  <div class="controls">
    <label>
      Strength:
      <input type="range" id="sl" min="0" max="1" step="0.01" value="1.0">
      <span id="slVal">1.00</span>
    </label>
    <button id="applyBtn">Apply shader &nbsp;(Ctrl+Enter)</button>
  </div>
  <div id="error"></div>

  <textarea id="editor" spellcheck="false">precision mediump float;

uniform sampler2D uPage;
uniform sampler2D uMask;
uniform float uStrength;
varying vec2 vUV;

void main() {
  float page = texture2D(uPage, vUV).r;
  float mask = texture2D(uMask, vUV).r;

  // Additive blend: lift dark pixels toward white by adding the mask value.
  // Clamped to 1.0 so bright paper stays white.
  gl_FragColor = vec4(vec3(min(page + mask * uStrength, 1.0)), 1.0);
}</textarea>

  <script>
    const canvas  = document.getElementById('c');
    const gl      = canvas.getContext('webgl');
    const errorEl = document.getElementById('error');
    const sl      = document.getElementById('sl');
    const slVal   = document.getElementById('slVal');

    // ── Vertex shader (fixed) ────────────────────────────────────────────────
    const VERT_SRC = `
      attribute vec2 aPos;
      varying vec2 vUV;
      void main() {
        vUV = aPos * 0.5 + 0.5;
        vUV.y = 1.0 - vUV.y;
        gl_Position = vec4(aPos, 0.0, 1.0);
      }
    `;

    // ── Quad buffer (shared) ─────────────────────────────────────────────────
    const quadBuf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
    gl.bufferData(
      gl.ARRAY_BUFFER,
      new Float32Array([-1, -1,  1, -1,  -1, 1,  1, 1]),
      gl.STATIC_DRAW
    );

    // ── Shader compilation ───────────────────────────────────────────────────
    let currentProg = null;

    function compileShader(type, src) {
      const s = gl.createShader(type);
      gl.shaderSource(s, src);
      gl.compileShader(s);
      return s;
    }

    function buildProgram(fragSrc) {
      const vs = compileShader(gl.VERTEX_SHADER, VERT_SRC);
      const fs = compileShader(gl.FRAGMENT_SHADER, fragSrc);

      if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
        throw new Error(gl.getShaderInfoLog(fs));
      }

      const p = gl.createProgram();
      gl.attachShader(p, vs);
      gl.attachShader(p, fs);
      gl.linkProgram(p);

      if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
        throw new Error(gl.getProgramInfoLog(p));
      }

      return p;
    }

    function activateProgram(prog) {
      if (currentProg) gl.deleteProgram(currentProg);
      currentProg = prog;

      gl.useProgram(prog);
      gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);

      const aPos = gl.getAttribLocation(prog, 'aPos');
      gl.enableVertexAttribArray(aPos);
      gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

      gl.uniform1i(gl.getUniformLocation(prog, 'uPage'), 0);
      gl.uniform1i(gl.getUniformLocation(prog, 'uMask'), 1);
    }

    function draw() {
      if (!currentProg) return;
      gl.uniform1f(
        gl.getUniformLocation(currentProg, 'uStrength'),
        parseFloat(sl.value)
      );
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    }

    function recompile() {
      try {
        activateProgram(buildProgram(document.getElementById('editor').value));
        errorEl.textContent = '';
        draw();
      } catch (e) {
        errorEl.textContent = e.message;
      }
    }

    // ── Embedded image data ──────────────────────────────────────────────────
    const B64_IMAGE = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAABACAAAAADQNvZiAAAAcUlEQVR4nO3OQQGAMADEsK7KcQ4u2KMXBTkvbRIncRIncRIncRIncRIncRIncRIncd4OzMzMzMzMzMz87bxxEidxEidxEidxEidxEidxEidxEidxEnce2iRO4iRO4iRO4iRO4iRO4iRO4iRO4rwduO0Dzy0A7O0K9gYAAAAASUVORK5CYII=';
    const B64_MASK  = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAABACAAAAADQNvZiAAAAeklEQVR4nOXOMQEAAAyDMIp/0ZOxgyjIWJvESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzESZzfgW8H1CIBf3F985cAAAAASUVORK5CYII=';

    // ── Texture loading ──────────────────────────────────────────────────────
    function loadTexture(slot, dataUri, filter) {
      return new Promise((resolve) => {
        const tex = gl.createTexture();
        const img = new Image();
        img.onload = () => {
          gl.activeTexture(gl.TEXTURE0 + slot);
          gl.bindTexture(gl.TEXTURE_2D, tex);
          gl.texImage2D(
            gl.TEXTURE_2D, 0, gl.LUMINANCE, gl.LUMINANCE,
            gl.UNSIGNED_BYTE, img
          );
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
          gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
          resolve();
        };
        img.src = dataUri;
      });
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    Promise.all([
      loadTexture(0, B64_IMAGE, gl.LINEAR),   // slot 0 — page
      loadTexture(1, B64_MASK,  gl.NEAREST),  // slot 1 — mask
    ]).then(() => {
      recompile();
    });

    // ── Controls ─────────────────────────────────────────────────────────────
    sl.addEventListener('input', () => {
      slVal.textContent = parseFloat(sl.value).toFixed(2);
      draw();
    });

    document.getElementById('applyBtn').addEventListener('click', recompile);

    document.getElementById('editor').addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        e.preventDefault();
        recompile();
      }
    });
  </script>
</body>
</html>
