    <!-- WebGL Options Bar -->
    <div id="webgl-options-bar" class="hidden">
      <span class="options-label">Mask Color</span>
      <input type="color" id="mask-color" value="#000000" title="Mask color">
      <div class="options-divider"></div>
      <span class="options-label">Mask Opacity</span>
      <input type="range" id="edge-subtract" min="0" max="255" step="1" value="255" title="Mask opacity">
    </div>
